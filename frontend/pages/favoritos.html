<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Biblioteca - Mis favoritos</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="paginaInicio">

  <header class="navbar">
    <a href="inicio.html" id="navInicio" class="navbar__logo">
      <div class="navbar__logoIcono" role="img" aria-label="Logo E-Biblioteca"></div>
      <span class="navbar__logoTexto">E-BIBLIOTECA</span>
    </a>

    <nav class="navbar__derecha">
      <a href="favoritos.html" id="navFavoritos" class="navbar__enlace">
        <span class="navbar__iconoCorazon" aria-hidden="true"></span>
        Favoritos
      </a>

      <div class="navbar__usuario">
        <button type="button" id="btnUsuario" class="navbar__usuarioToggle">
          <span class="navbar__iconoUsuario" aria-hidden="true"></span>
          <span id="nombreUsuario">Usuario</span>
          <span class="navbar__flecha">▾</span>
        </button>

        <div  id="menuUsuario" class="navbar__dropdown">
          <a href="perfil.html" id="navPerfil">Mi perfil</a>
          <button type="button" id="btnCerrarSesion">Cerrar sesión</button>
        </div>
      </div>
    </nav>
  </header>


  <main>

    <section class="heroFavoritos">
      <div class="heroFavoritos__patron" aria-hidden="true"></div>

      <h1 class="heroFavoritos__titulo">Mis favoritos</h1>
      <p class="heroFavoritos__subtitulo">Consulta rápidamente los libros que has guardado</p>

      <div class="heroFavoritos__buscador">
        <input
          type="text"
          id="buscadorFavoritos"
          name="buscadorFavoritos"
          placeholder="Buscar en favoritos...">
        <span class="iconoLupa" aria-hidden="true"></span>
      </div>
    </section>

    <section class="contenedorCatalogo">
      <p class="favoritos__contador">
        <img class="favoritos__iconoCorazon" src="../assets/iconos/corazon_rojo_icono.png" alt="Icono Favoritos" aria-hidden="true">
        <span id="cantidadFavoritos"></span> libros guardados
      </p>

      
      <div id="contenedorFavoritos"></div>

      
      <div id="favoritosVacio" class="favoritosVacio" hidden>
        <span class="favoritosVacio__icono" aria-hidden="true">♡</span>
        <p>No se han encontrado libros</p>
        <a href="inicio.html" class="favoritosVacio__btn">Explorar libros</a>
      </div>
    </section>

  </main>

  <footer class="footerInicio">
    <span>E-Biblioteca &nbsp;© 2026 E-Biblioteca. Todos los derechos reservados.</span>
    <div class="footerInicio__enlaces">
      <a href="inicio.html">Inicio</a>
      <a href="contacto.html" id="navContacto">Contacto</a>
      <a href="#" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>
  <script src="../js/navegacionLibros.js"></script>
  <script src="../js/favoritos.js"></script>
  
</body>
</html>
