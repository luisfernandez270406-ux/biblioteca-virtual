<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Biblioteca - Crear cuenta</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="paginaLogin">

  <main class="contenedorLogin">

    <div class="imagenLogin"></div>

    <div class="panelLogin">

      <div class="logoLogin">
        <div class="logoLogin__icono" role="img" aria-label="Logo E-Biblioteca"></div>
        <div class="logoLogin__texto">
          <span class="logoLogin__nombre">E-BIBLIOTECA</span>
          <span class="logoLogin__lema">¡Tu biblioteca digital!</span>
        </div>
      </div>

      <h1 class="tituloLogin">Crear cuenta</h1>

      <form id="formRegistro">

        <div class="campoLogin">
          <input
            type="text"
            id="nombreCompleto"
            name="nombreCompleto"
            placeholder="Nombre Completo"
            required>
        </div>

        <div class="campoLogin">
          <input
            type="text"
            id="nombreUsuario"
            name="nombreUsuario"
            placeholder="Nombre de usuario"
            required>
        </div>

        <div class="campoLogin">
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="Correo Electrónico"
            required>
        </div>

        <div class="campoLogin">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Contraseña"
            required>
        </div>

        <button type="submit" id="btnRegistro">Crear cuenta</button>
        <div id="mensajeRegistro"></div>

      </form>

      <p class="enlaceLogin">
        <a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a>
      </p>

    </div>

  </main>

  <script src="../js/registro.js"></script>
</body>
</html>
